version: '3.8'

services:
  zitate-web:
    build:
      context: ./Zitate.web
      dockerfile: Dockerfile
    container_name: zitate-web
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    labels:
      - "com.zitate.app=web"
      - "com.zitate.version=1.0"
