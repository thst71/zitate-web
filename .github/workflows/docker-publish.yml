name: Build and Publish Web Docker Image

on:
  push:
    tags: [ 'v*.*.*' ]
    # Only trigger if changes happen in the web directory or this workflow file
    paths:
      - 'Zitate.web/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Zitate.web/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Zitate.web/package-lock.json

      - name: Install dependencies
        working-directory: ./Zitate.web
        run: npm ci

      - name: Run linting
        working-directory: ./Zitate.web
        run: npm run lint

      - name: Run type checking
        working-directory: ./Zitate.web
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: ./Zitate.web
        run: npm run test -- --coverage

      - name: Build application
        working-directory: ./Zitate.web
        run: npm run build


  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Zitate.web/package-lock.json

      - name: Install dependencies
        working-directory: ./Zitate.web
        run: npm ci

      - name: Run security audit
        working-directory: ./Zitate.web
        run: npm audit --audit-level moderate

      - name: Check for vulnerable packages
        working-directory: ./Zitate.web
        run: npx better-npm-audit audit --level moderate

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped')
    
    # Sets permissions to allow the action to upload to GitHub Packages
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        # Only login if it's not a PR, to avoid unauthorized pushes
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: ./Zitate.web
          file: ./Zitate.web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

